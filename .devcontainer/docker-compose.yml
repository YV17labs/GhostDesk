services:
  ghostdesk:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/ghostdesk:cached
    ports:
      - "3000:3000"
      - "6080:6080"
    environment:
      - GHOSTDESK_DIR=/workspaces/ghostdesk
      - GHOSTDESK_USER=vscode
      - TZ=America/Montreal
      - LANG=fr_CA.UTF-8
