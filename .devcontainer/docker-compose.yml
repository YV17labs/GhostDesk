services:
  ghostdesk:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/ghostdesk:cached
    ports:
      - "3000:3000"
      - "5900:5900"
      - "6080:6080"
    environment:
      - SCREEN_WIDTH=1280
      - SCREEN_HEIGHT=1024
      - VNC_PASSWORD=changeme
      - TZ=America/Montreal
      - LOCALE=fr_CA.utf8
    shm_size: "2gb"
    command: sleep infinity
