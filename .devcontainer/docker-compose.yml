services:
  ghostdesk:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - ..:/workspaces/ghostdesk:cached
    ports:
      - "3000:3000"
      - "5900:5900"
      - "6080:6080"
    environment:
      - TZ=America/Montreal
      - LOCALE=fr_CA.utf8
      - GHOSTDESK_MODEL_SPACE=0
    stop_grace_period: 10s
    command: ["/init"]
