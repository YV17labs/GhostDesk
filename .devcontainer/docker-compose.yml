services:
  ghostdesk:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspaces/ghostdesk:cached
    ports:
      - "3000:3000"
      - "5900:5900"
      - "6080:6080"
    environment:
      - DISPLAY=:99
      - SCREEN_WIDTH=1280
      - SCREEN_HEIGHT=800
      - SCREEN_DEPTH=24
      - VNC_PASSWORD=changeme
      - PORT=3000
    shm_size: "2gb"
    command: sleep infinity
