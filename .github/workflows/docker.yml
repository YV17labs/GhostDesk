name: Docker

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

# Cancel an in-flight build for the same ref (useful when re-tagging).
concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      # Required for SLSA provenance attestation signing.
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=base
            type=semver,pattern=base-{{version}}
            type=semver,pattern=base-{{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=ghostdesk
            org.opencontainers.image.description=MCP server to control a virtual Linux desktop from an LLM agent
            org.opencontainers.image.authors=Yoann Vanitou <yvanitou@gmail.com>
            org.opencontainers.image.vendor=YV17
            org.opencontainers.image.licenses=LicenseRef-FSL-1.1-ALv2

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/base/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base
          platforms: linux/amd64,linux/arm64
          # Supply-chain hardening — SLSA provenance + SBOM attached to the
          # image manifest. Both are verifiable with `cosign verify-attestation`.
          provenance: mode=max
          sbom: true
          build-args: |
            GHOSTDESK_VERSION=${{ github.ref_name }}
            GHOSTDESK_GIT_SHA=${{ github.sha }}

  build-latest:
    needs: build-base
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
          labels: |
            org.opencontainers.image.title=ghostdesk
            org.opencontainers.image.description=MCP server to control a virtual Linux desktop from an LLM agent
            org.opencontainers.image.authors=Yoann Vanitou <yvanitou@gmail.com>
            org.opencontainers.image.vendor=YV17
            org.opencontainers.image.licenses=LicenseRef-FSL-1.1-ALv2

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: |
            type=gha,scope=latest
            type=gha,scope=base
          cache-to: type=gha,mode=max,scope=latest
          platforms: linux/amd64,linux/arm64
          provenance: mode=max
          sbom: true
          build-args: |
            GHOSTDESK_VERSION=${{ github.ref_name }}
            GHOSTDESK_GIT_SHA=${{ github.sha }}
