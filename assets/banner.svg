<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2560 640" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#23213F"/>
      <stop offset="50%" stop-color="#1A1B2E"/>
      <stop offset="100%" stop-color="#0D0E1A"/>
    </linearGradient>

    <radialGradient id="haloLeft" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7B6FDE" stop-opacity="0.32"/>
      <stop offset="60%" stop-color="#7B6FDE" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#7B6FDE" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="haloRight" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5DCAA5" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#5DCAA5" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="horizonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B6FDE" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7B6FDE" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7B6FDE" stop-opacity="0"/>
    </linearGradient>

    <pattern id="grid" x="0" y="0" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#7B6FDE" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>

    <pattern id="dots" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1" fill="#E8E6FF" fill-opacity="0.06"/>
    </pattern>

    <filter id="bigBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="50"/>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="2560" height="640" fill="url(#bgGrad)"/>
  <rect width="2560" height="640" fill="url(#grid)"/>
  <rect width="2560" height="640" fill="url(#dots)"/>

  <!-- Ambient washes -->
  <ellipse cx="760"  cy="320" rx="700" ry="380" fill="url(#haloLeft)"/>
  <ellipse cx="2000" cy="460" rx="520" ry="280" fill="url(#haloRight)"/>
  <ellipse cx="1900" cy="160" rx="420" ry="220" fill="url(#haloLeft)" opacity="0.55"/>

  <!-- Horizon line -->
  <rect x="0" y="319" width="2560" height="1.5" fill="url(#horizonGrad)"/>

  <!-- Scan rings around ghost -->
  <g fill="none" stroke="#7B6FDE" stroke-opacity="0.09">
    <circle cx="760" cy="320" r="180"/>
    <circle cx="760" cy="320" r="280"/>
    <circle cx="760" cy="320" r="400"/>
  </g>

  <!-- Starfield -->
  <g fill="#E8E6FF">
    <circle cx="140"  cy="90"  r="1.2" opacity="0.55"/>
    <circle cx="380"  cy="60"  r="0.9" opacity="0.35"/>
    <circle cx="1220" cy="80"  r="1.0" opacity="0.5"/>
    <circle cx="1620" cy="120" r="1.3" opacity="0.6"/>
    <circle cx="2080" cy="70"  r="0.9" opacity="0.4"/>
    <circle cx="2380" cy="140" r="1.1" opacity="0.55"/>
    <circle cx="200"  cy="560" r="1.0" opacity="0.45"/>
    <circle cx="1180" cy="590" r="0.9" opacity="0.4"/>
    <circle cx="1520" cy="550" r="1.2" opacity="0.55"/>
    <circle cx="2200" cy="580" r="0.8" opacity="0.35"/>
    <circle cx="2440" cy="560" r="1.3" opacity="0.6"/>
  </g>

  <!-- ============ Ghost logo (left side) ============ -->
  <g transform="translate(760 320) scale(1.9)">
    <ellipse cx="0" cy="0" rx="220" ry="220" fill="#7B6FDE" opacity="0.18" filter="url(#bigBlur)"/>

    <path d="
      M -80 110
      L -80 -10
      C -80 -55, -60 -90, 0 -90
      C 60 -90, 80 -55, 80 -10
      L 80 110
      L 60 80
      L 40 110
      L 20 80
      L 0 110
      L -20 80
      L -40 110
      L -60 80
      Z
    " fill="#7B6FDE" opacity="0.92"/>

    <rect x="-55" y="-45" width="110" height="80" rx="7" fill="#0D0E1A"/>

    <rect x="-45" y="-30" width="45" height="4" rx="2" fill="#5DCAA5" opacity="0.9"/>
    <rect x="-45" y="-18" width="70" height="4" rx="2" fill="#5DCAA5" opacity="0.6"/>
    <rect x="-45" y="-6"  width="35" height="4" rx="2" fill="#5DCAA5" opacity="0.4"/>
    <rect x="-5"  y="-6"  width="8"  height="4" rx="1" fill="#5DCAA5" opacity="0.9"/>
    <rect x="-45" y="6"   width="55" height="4" rx="2" fill="#5DCAA5" opacity="0.3"/>

    <circle cx="-30" cy="-60" r="10" fill="#E8E6FF"/>
    <circle cx="30"  cy="-60" r="10" fill="#E8E6FF"/>
    <circle cx="-27" cy="-59" r="5"  fill="#1A1B2E"/>
    <circle cx="33"  cy="-59" r="5"  fill="#1A1B2E"/>

    <path d="M 45 25 L 45 45 L 52 38 L 60 50 L 64 48 L 56 36 L 65 33 Z" fill="#FFFFFF" opacity="0.95"/>
  </g>

  <!-- Vertical divider between logo and wordmark -->
  <line x1="1140" y1="180" x2="1140" y2="460" stroke="#7B6FDE" stroke-opacity="0.25" stroke-width="1"/>

  <!-- ============ Wordmark (right side) ============ -->
  <g font-family="'Helvetica Neue', 'Segoe UI', Roboto, sans-serif">
    <text x="1200" y="290" font-size="120" font-weight="500" fill="#E8E6FF" letter-spacing="6">GhostDesk</text>
    <text x="1204" y="340" font-size="22" font-weight="400" fill="#7B6FDE" opacity="0.9" letter-spacing="10">VIRTUAL  DESKTOP  CONTROL</text>

    <!-- Tagline -->
    <text x="1204" y="410" font-size="26" font-weight="400" fill="#E8E6FF" opacity="0.75" letter-spacing="1">Give your AI agent eyes, hands, and a full Linux desktop.</text>

    <!-- Feature chips -->
    <g font-size="16" font-weight="500" letter-spacing="3" fill="#E8E6FF">
      <g transform="translate(1204 450)">
        <rect x="0"   y="0" width="110" height="34" rx="17" fill="none" stroke="#7B6FDE" stroke-opacity="0.55"/>
        <text x="55"  y="22" text-anchor="middle" opacity="0.9">MCP</text>

        <rect x="126" y="0" width="130" height="34" rx="17" fill="none" stroke="#7B6FDE" stroke-opacity="0.55"/>
        <text x="191" y="22" text-anchor="middle" opacity="0.9">DOCKER</text>

        <rect x="272" y="0" width="160" height="34" rx="17" fill="none" stroke="#5DCAA5" stroke-opacity="0.55"/>
        <text x="352" y="22" text-anchor="middle" opacity="0.9" fill="#5DCAA5">VNC  READY</text>

        <rect x="448" y="0" width="170" height="34" rx="17" fill="none" stroke="#7B6FDE" stroke-opacity="0.55"/>
        <text x="533" y="22" text-anchor="middle" opacity="0.9">PYTHON 3.12+</text>
      </g>
    </g>
  </g>

  <!-- Corner brackets -->
  <g stroke="#7B6FDE" stroke-opacity="0.35" stroke-width="1.5" fill="none">
    <path d="M 40 40 L 40 90 M 40 40 L 90 40"/>
    <path d="M 2520 40 L 2520 90 M 2520 40 L 2470 40"/>
    <path d="M 40 600 L 40 550 M 40 600 L 90 600"/>
    <path d="M 2520 600 L 2520 550 M 2520 600 L 2470 600"/>
  </g>

  <!-- Corner labels -->
  <g font-family="'Helvetica Neue', monospace" font-size="13" fill="#E8E6FF" opacity="0.35" letter-spacing="2">
    <text x="110" y="62">SESSION  /  ACTIVE</text>
    <text x="2450" y="62" text-anchor="end">YV17  ·  GHOSTDESK</text>
    <text x="110" y="588">VNC  ·  READY</text>
    <text x="2450" y="588" text-anchor="end">v7.0</text>
  </g>
</svg>
