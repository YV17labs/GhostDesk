<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2560 1600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="55%" r="75%">
      <stop offset="0%" stop-color="#23213F"/>
      <stop offset="45%" stop-color="#1A1B2E"/>
      <stop offset="100%" stop-color="#0D0E1A"/>
    </radialGradient>

    <radialGradient id="haloGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7B6FDE" stop-opacity="0.28"/>
      <stop offset="45%" stop-color="#7B6FDE" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7B6FDE" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="accentGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5DCAA5" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#5DCAA5" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="horizonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B6FDE" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7B6FDE" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7B6FDE" stop-opacity="0"/>
    </linearGradient>

    <pattern id="grid" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#7B6FDE" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>

    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1" fill="#E8E6FF" fill-opacity="0.06"/>
    </pattern>

    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="bigBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="60"/>
    </filter>
  </defs>

  <!-- Deep navy base -->
  <rect width="2560" height="1600" fill="url(#bgGrad)"/>

  <!-- Subtle tech grid -->
  <rect width="2560" height="1600" fill="url(#grid)"/>
  <rect width="2560" height="1600" fill="url(#dots)"/>

  <!-- Ambient color washes -->
  <ellipse cx="1280" cy="800" rx="1100" ry="700" fill="url(#haloGrad)"/>
  <ellipse cx="1950" cy="1250" rx="520" ry="320" fill="url(#accentGrad)"/>
  <ellipse cx="650" cy="350" rx="480" ry="300" fill="url(#haloGrad)" opacity="0.6"/>

  <!-- Horizon line through the center -->
  <rect x="0" y="799" width="2560" height="1.5" fill="url(#horizonGrad)"/>

  <!-- Distant scan rings -->
  <g fill="none" stroke="#7B6FDE" stroke-opacity="0.09">
    <circle cx="1280" cy="800" r="260"/>
    <circle cx="1280" cy="800" r="420"/>
    <circle cx="1280" cy="800" r="620"/>
    <circle cx="1280" cy="800" r="860"/>
  </g>

  <!-- Starfield (static, subtle) -->
  <g fill="#E8E6FF">
    <circle cx="180"  cy="220"  r="1.2" opacity="0.55"/>
    <circle cx="420"  cy="140"  r="0.9" opacity="0.35"/>
    <circle cx="760"  cy="260"  r="1.4" opacity="0.7"/>
    <circle cx="1100" cy="110"  r="0.8" opacity="0.4"/>
    <circle cx="1480" cy="180"  r="1.0" opacity="0.5"/>
    <circle cx="1820" cy="95"   r="1.3" opacity="0.65"/>
    <circle cx="2160" cy="220"  r="0.9" opacity="0.35"/>
    <circle cx="2400" cy="140"  r="1.1" opacity="0.55"/>
    <circle cx="260"  cy="1380" r="1.0" opacity="0.45"/>
    <circle cx="560"  cy="1480" r="0.8" opacity="0.3"/>
    <circle cx="920"  cy="1420" r="1.2" opacity="0.55"/>
    <circle cx="1360" cy="1500" r="0.9" opacity="0.4"/>
    <circle cx="1720" cy="1440" r="1.1" opacity="0.5"/>
    <circle cx="2080" cy="1380" r="0.8" opacity="0.35"/>
    <circle cx="2340" cy="1500" r="1.3" opacity="0.6"/>
  </g>

  <!-- ============ Centered ghost logo ============ -->
  <g transform="translate(1280 760) scale(1.6)">
    <!-- Soft glow behind ghost -->
    <ellipse cx="0" cy="0" rx="240" ry="240" fill="#7B6FDE" opacity="0.16" filter="url(#bigBlur)"/>

    <!-- Ghost body (re-centered around 0,0) -->
    <path d="
      M -80 110
      L -80 -10
      C -80 -55, -60 -90, 0 -90
      C 60 -90, 80 -55, 80 -10
      L 80 110
      L 60 80
      L 40 110
      L 20 80
      L 0 110
      L -20 80
      L -40 110
      L -60 80
      Z
    " fill="#7B6FDE" opacity="0.92"/>

    <!-- Monitor -->
    <rect x="-55" y="-45" width="110" height="80" rx="7" fill="#0D0E1A"/>

    <!-- Terminal lines -->
    <rect x="-45" y="-30" width="45" height="4" rx="2" fill="#5DCAA5" opacity="0.9"/>
    <rect x="-45" y="-18" width="70" height="4" rx="2" fill="#5DCAA5" opacity="0.6"/>
    <rect x="-45" y="-6"  width="35" height="4" rx="2" fill="#5DCAA5" opacity="0.4"/>
    <rect x="-5"  y="-6"  width="8"  height="4" rx="1" fill="#5DCAA5" opacity="0.9"/>
    <rect x="-45" y="6"   width="55" height="4" rx="2" fill="#5DCAA5" opacity="0.3"/>

    <!-- Eyes -->
    <circle cx="-30" cy="-60" r="10" fill="#E8E6FF"/>
    <circle cx="30"  cy="-60" r="10" fill="#E8E6FF"/>
    <circle cx="-27" cy="-59" r="5"  fill="#1A1B2E"/>
    <circle cx="33"  cy="-59" r="5"  fill="#1A1B2E"/>

    <!-- Cursor -->
    <path d="M 45 25 L 45 45 L 52 38 L 60 50 L 64 48 L 56 36 L 65 33 Z" fill="#FFFFFF" opacity="0.95"/>
  </g>

  <!-- ============ Wordmark ============ -->
  <g text-anchor="middle" font-family="'Helvetica Neue', 'Segoe UI', Roboto, sans-serif">
    <text x="1280" y="1120" font-size="72" font-weight="500" fill="#E8E6FF" letter-spacing="6">GhostDesk</text>
    <text x="1280" y="1168" font-size="18" font-weight="400" fill="#7B6FDE" opacity="0.85" letter-spacing="10">VIRTUAL  DESKTOP  CONTROL</text>
  </g>

  <!-- Footer mark -->
  <g text-anchor="middle" font-family="'Helvetica Neue', 'Segoe UI', Roboto, sans-serif">
    <text x="1280" y="1540" font-size="13" font-weight="400" fill="#E8E6FF" opacity="0.32" letter-spacing="6">BY  YV17</text>
  </g>

  <!-- Corner accent brackets -->
  <g stroke="#7B6FDE" stroke-opacity="0.35" stroke-width="1.5" fill="none">
    <path d="M 60 60 L 60 120 M 60 60 L 120 60"/>
    <path d="M 2500 60 L 2500 120 M 2500 60 L 2440 60"/>
    <path d="M 60 1540 L 60 1480 M 60 1540 L 120 1540"/>
    <path d="M 2500 1540 L 2500 1480 M 2500 1540 L 2440 1540"/>
  </g>

  <!-- Corner labels -->
  <g font-family="'Helvetica Neue', monospace" font-size="11" fill="#E8E6FF" opacity="0.35" letter-spacing="2">
    <text x="140" y="88">SESSION  /  ACTIVE</text>
    <text x="2420" y="88" text-anchor="end">YV17  ·  GHOSTDESK</text>
    <text x="140" y="1522">VNC  ·  READY</text>
    <text x="2420" y="1522" text-anchor="end">v7.0</text>
  </g>
</svg>
