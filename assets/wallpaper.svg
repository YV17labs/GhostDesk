<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1024" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="55%" r="75%">
      <stop offset="0%" stop-color="#23213F"/>
      <stop offset="45%" stop-color="#1A1B2E"/>
      <stop offset="100%" stop-color="#0D0E1A"/>
    </radialGradient>

    <radialGradient id="haloGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7B6FDE" stop-opacity="0.28"/>
      <stop offset="45%" stop-color="#7B6FDE" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#7B6FDE" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="accentGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#5DCAA5" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#5DCAA5" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="horizonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7B6FDE" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7B6FDE" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7B6FDE" stop-opacity="0"/>
    </linearGradient>

    <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#7B6FDE" stroke-opacity="0.05" stroke-width="1"/>
    </pattern>

    <pattern id="dots" x="0" y="0" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="12" cy="12" r="0.8" fill="#E8E6FF" fill-opacity="0.06"/>
    </pattern>

    <filter id="bigBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Base -->
  <rect width="1280" height="1024" fill="url(#bgGrad)"/>
  <rect width="1280" height="1024" fill="url(#grid)"/>
  <rect width="1280" height="1024" fill="url(#dots)"/>

  <!-- Ambient washes -->
  <ellipse cx="640"  cy="500" rx="620" ry="460" fill="url(#haloGrad)"/>
  <ellipse cx="980"  cy="800" rx="340" ry="220" fill="url(#accentGrad)"/>
  <ellipse cx="300"  cy="220" rx="300" ry="200" fill="url(#haloGrad)" opacity="0.55"/>

  <!-- Horizon -->
  <rect x="0" y="511" width="1280" height="1.5" fill="url(#horizonGrad)"/>

  <!-- Scan rings -->
  <g fill="none" stroke="#7B6FDE" stroke-opacity="0.09">
    <circle cx="640" cy="460" r="180"/>
    <circle cx="640" cy="460" r="280"/>
    <circle cx="640" cy="460" r="400"/>
    <circle cx="640" cy="460" r="540"/>
  </g>

  <!-- Starfield -->
  <g fill="#E8E6FF">
    <circle cx="90"   cy="140" r="1.1" opacity="0.55"/>
    <circle cx="220"  cy="80"  r="0.8" opacity="0.35"/>
    <circle cx="410"  cy="170" r="1.2" opacity="0.65"/>
    <circle cx="590"  cy="70"  r="0.8" opacity="0.4"/>
    <circle cx="780"  cy="120" r="1.0" opacity="0.5"/>
    <circle cx="940"  cy="60"  r="1.2" opacity="0.6"/>
    <circle cx="1120" cy="140" r="0.9" opacity="0.4"/>
    <circle cx="1220" cy="90"  r="1.0" opacity="0.5"/>
    <circle cx="130"  cy="900" r="1.0" opacity="0.45"/>
    <circle cx="300"  cy="960" r="0.8" opacity="0.3"/>
    <circle cx="490"  cy="920" r="1.1" opacity="0.55"/>
    <circle cx="720"  cy="970" r="0.9" opacity="0.4"/>
    <circle cx="900"  cy="930" r="1.1" opacity="0.5"/>
    <circle cx="1080" cy="880" r="0.8" opacity="0.35"/>
    <circle cx="1200" cy="960" r="1.2" opacity="0.6"/>
  </g>

  <!-- ============ Centered ghost logo ============ -->
  <g transform="translate(640 440) scale(1.4)">
    <ellipse cx="0" cy="0" rx="220" ry="220" fill="#7B6FDE" opacity="0.16" filter="url(#bigBlur)"/>

    <path d="
      M -80 110
      L -80 -10
      C -80 -55, -60 -90, 0 -90
      C 60 -90, 80 -55, 80 -10
      L 80 110
      L 60 80
      L 40 110
      L 20 80
      L 0 110
      L -20 80
      L -40 110
      L -60 80
      Z
    " fill="#7B6FDE" opacity="0.92"/>

    <rect x="-55" y="-45" width="110" height="80" rx="7" fill="#0D0E1A"/>

    <rect x="-45" y="-30" width="45" height="4" rx="2" fill="#5DCAA5" opacity="0.9"/>
    <rect x="-45" y="-18" width="70" height="4" rx="2" fill="#5DCAA5" opacity="0.6"/>
    <rect x="-45" y="-6"  width="35" height="4" rx="2" fill="#5DCAA5" opacity="0.4"/>
    <rect x="-5"  y="-6"  width="8"  height="4" rx="1" fill="#5DCAA5" opacity="0.9"/>
    <rect x="-45" y="6"   width="55" height="4" rx="2" fill="#5DCAA5" opacity="0.3"/>

    <circle cx="-30" cy="-60" r="10" fill="#E8E6FF"/>
    <circle cx="30"  cy="-60" r="10" fill="#E8E6FF"/>
    <circle cx="-27" cy="-59" r="5"  fill="#1A1B2E"/>
    <circle cx="33"  cy="-59" r="5"  fill="#1A1B2E"/>

    <path d="M 45 25 L 45 45 L 52 38 L 60 50 L 64 48 L 56 36 L 65 33 Z" fill="#FFFFFF" opacity="0.95"/>
  </g>

  <!-- Wordmark -->
  <g text-anchor="middle" font-family="'Helvetica Neue', 'Segoe UI', Roboto, sans-serif">
    <text x="640" y="720" font-size="52" font-weight="500" fill="#E8E6FF" letter-spacing="4">GhostDesk</text>
    <text x="640" y="752" font-size="13" font-weight="400" fill="#7B6FDE" opacity="0.85" letter-spacing="7">VIRTUAL  DESKTOP  CONTROL</text>
  </g>

  <!-- Footer mark -->
  <g text-anchor="middle" font-family="'Helvetica Neue', 'Segoe UI', Roboto, sans-serif">
    <text x="640" y="988" font-size="10" font-weight="400" fill="#E8E6FF" opacity="0.32" letter-spacing="5">BY  YV17</text>
  </g>

  <!-- Corner brackets -->
  <g stroke="#7B6FDE" stroke-opacity="0.35" stroke-width="1.5" fill="none">
    <path d="M 36 36 L 36 80 M 36 36 L 80 36"/>
    <path d="M 1244 36 L 1244 80 M 1244 36 L 1200 36"/>
    <path d="M 36 988 L 36 944 M 36 988 L 80 988"/>
    <path d="M 1244 988 L 1244 944 M 1244 988 L 1200 988"/>
  </g>

  <g font-family="'Helvetica Neue', monospace" font-size="10" fill="#E8E6FF" opacity="0.35" letter-spacing="2">
    <text x="96"   y="56">SESSION  /  ACTIVE</text>
    <text x="1188" y="56" text-anchor="end">YV17  ·  GHOSTDESK</text>
    <text x="96"   y="976">VNC  ·  READY</text>
    <text x="1188" y="976" text-anchor="end">v7.0</text>
  </g>
</svg>
