; VNC server, pinned to 127.0.0.1. When a TLS cert is mounted the
; config rendered by entrypoint.sh enables classic VNC Auth (RFB
; security type 2) with a single password; otherwise auth is disabled
; and wayvnc serves plain RFB on loopback only. The browser always
; reaches wayvnc through websockify on :6080.
[program:wayvnc]
command=wayvnc
user=%(ENV_GHOSTDESK_USER)s
priority=40
autorestart=true
startretries=20
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
