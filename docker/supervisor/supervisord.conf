; ghostdesk supervisord — shared by prod (docker/base/Dockerfile) and dev
; (.devcontainer/Dockerfile). Per-service program definitions live in
; conf.d/ and are composed via [include] below.
;
; Target user differs per environment, injected via GHOSTDESK_USER:
;   prod: agent   (docker/base/Dockerfile ENV)
;   dev:  vscode  (.devcontainer/docker-compose.yml environment:)
;
; pidfile and socket live under /tmp so supervisord runs unprivileged in
; dev (launched by the "GhostDesk: Start stack" VS Code task) without
; sudo. In prod it runs as PID 1 / root; /tmp is fine too.

[supervisord]
nodaemon=true
pidfile=/tmp/supervisord.pid
logfile=/dev/null
logfile_maxbytes=0
loglevel=info
; Force HOME/USER/LOGNAME on every child. supervisord's `user=` drops
; privileges but does NOT update HOME — a supervisord started via sudo
; (HOME=/root) would leave wayvnc reading /root/.config/wayvnc/config and
; crash-loop on "Permission denied". Do not remove without understanding.
environment=HOME="/home/%(ENV_GHOSTDESK_USER)s",USER="%(ENV_GHOSTDESK_USER)s",LOGNAME="%(ENV_GHOSTDESK_USER)s",XDG_CONFIG_HOME="/home/%(ENV_GHOSTDESK_USER)s/.config"

; Socket is gated by filesystem ACLs (0700, owner-match). supervisord
; logs a "running without any HTTP authentication" CRIT at boot; that
; noise is accepted — HTTP Basic over an owner-only unix socket would
; be theater.
[unix_http_server]
file=/tmp/supervisor.sock
chmod=0700

[supervisorctl]
serverurl=unix:///tmp/supervisor.sock

[rpcinterface:supervisor]
supervisor.rpcinterface_factory = supervisor.rpcinterface:make_main_rpcinterface

[include]
files = /etc/supervisor/conf.d/*.conf
